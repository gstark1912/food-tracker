version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: foodtracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=foodtracker;Username=postgres;Password=postgres"
      Cors__AllowedOrigins: "http://localhost:5173"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - postgres

volumes:
  postgres_data:
